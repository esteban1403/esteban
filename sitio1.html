<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definición de un estilo en función del contexto</title>

    <style>
        p strong {
            color: rgba(175, 202, 55, 0.808);
        }

        h1 strong {
            color: rgb(255, 154, 22);
        }
    </style>
</head>

<body>
    <h1>Este es un título para <strong>texto en negrita</strong></h1>

    <p>Este es un título para <strong>texto en negrita</strong></p>
</body>
</html>
